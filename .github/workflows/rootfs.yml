name: OpenWrt RootFS Extractor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install tools
      - name: Install tools
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            binwalk \
            squashfs-tools \
            p7zip-full \
            rsync \
            file

      # Download firmware
      - name: Download firmware
        run: |
          wget -O firmware.bin \
          "https://drive.usercontent.google.com/uc?id=1mxqnnH5r3YLlU4on0YMZVTZSrre72C3o&export=download"

      # Show firmware
      - name: Show firmware
        run: |
          ls -lah
          file firmware.bin

      # Extract firmware
      - name: Extract firmware
        run: |
          sudo binwalk --run-as=root -eM firmware.bin

      # Fix permissions
      - name: Fix permissions
        run: |
          sudo chmod -R 755 .
          sudo chown -R $USER:$USER .

      # Find squashfs-root
      - name: Find squashfs-root
        run: |
          echo "===== SEARCH squashfs-root ====="

          find . -type d -name "squashfs-root"

      # Remove old rootfs
      - name: Remove old rootfs
        run: |
          rm -rf rootfs

      # Copy squashfs-root safely
      - name: Copy squashfs-root
        run: |
          mkdir -p rootfs

          ROOTFS_DIR=$(find . -type d -name "squashfs-root" | head -n 1)

          echo "FOUND ROOTFS:"
          echo "$ROOTFS_DIR"

          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            "$ROOTFS_DIR"/ \
            rootfs/

      # Show rootfs
      - name: Show rootfs
        run: |
          echo "===== ROOTFS ====="

          find rootfs | head -200

      # Commit rootfs to GitHub
      - name: Commit rootfs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add rootfs

          git commit -m "Auto extract firmware rootfs" || echo "No changes"

          git push
