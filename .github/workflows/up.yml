name: Build RG-MTFi-M520 Sysupgrade

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout repository
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install required packages
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            rsync \
            tar \
            file \
            squashfs-tools

      #
      # Create working directories
      #
      - name: Prepare directories
        run: |
          mkdir -p firmware
          mkdir -p output

      #
      # Download official X-WRT kernel
      #
      - name: Download X-WRT kernel
        run: |
          wget -O firmware/kernel \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

      #
      # Download official X-WRT rootfs
      #
      - name: Download X-WRT rootfs
        run: |
          wget -O firmware/rootfs.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p3-rootfs.bin

      #
      # Extract original rootfs
      #
      - name: Extract rootfs
        run: |
          unsquashfs -d squashfs-root firmware/rootfs.bin

          echo "===== ORIGINAL ROOTFS ====="

          find squashfs-root | head -200

      #
      # Inject SAFE custom overlay
      #
      - name: Inject custom files
        run: |

          #
          # SAFE ETC
          #
          if [ -d rootfs/etc/config ]; then
            rsync -a rootfs/etc/config/ squashfs-root/etc/config/
          fi

          if [ -d rootfs/etc/init.d ]; then
            rsync -a rootfs/etc/init.d/ squashfs-root/etc/init.d/
          fi

          if [ -d rootfs/etc/uci-defaults ]; then
            rsync -a rootfs/etc/uci-defaults/ squashfs-root/etc/uci-defaults/
          fi

          if [ -d rootfs/etc/nginx ]; then
            rsync -a rootfs/etc/nginx/ squashfs-root/etc/nginx/
          fi

          if [ -d rootfs/etc/profile.d ]; then
            rsync -a rootfs/etc/profile.d/ squashfs-root/etc/profile.d/
          fi

          if [ -d rootfs/etc/sysctl.d ]; then
            rsync -a rootfs/etc/sysctl.d/ squashfs-root/etc/sysctl.d/
          fi

          if [ -d rootfs/etc/nftables.d ]; then
            rsync -a rootfs/etc/nftables.d/ squashfs-root/etc/nftables.d/
          fi

          if [ -d rootfs/etc/rc.button ]; then
            rsync -a rootfs/etc/rc.button/ squashfs-root/etc/rc.button/
          fi

          #
          # SAFE USR
          #
          if [ -d rootfs/usr/bin ]; then
            rsync -a rootfs/usr/bin/ squashfs-root/usr/bin/
          fi

          if [ -d rootfs/usr/sbin ]; then
            rsync -a rootfs/usr/sbin/ squashfs-root/usr/sbin/
          fi

          if [ -d rootfs/usr/lib/lua ]; then
            rsync -a rootfs/usr/lib/lua/ squashfs-root/usr/lib/lua/
          fi

          if [ -d rootfs/usr/share ]; then
            rsync -a rootfs/usr/share/ squashfs-root/usr/share/
          fi

          #
          # SAFE WWW
          #
          if [ -d rootfs/www ]; then
            rsync -a rootfs/www/ squashfs-root/www/
          fi

          echo "===== MERGED ROOTFS ====="

          find squashfs-root | head -300

      #
      # Rebuild squashfs root
      #
      - name: Build new root
        run: |
          mksquashfs \
            squashfs-root \
            firmware/root \
            -noappend \
            -comp xz \
            -b 262144 \
            -no-xattrs \
            -all-root

      #
      # Create CONTROL
      #
      - name: Create CONTROL
        run: |
          echo "BOARD=ruijie,rg-mtfi-m520" > firmware/CONTROL
          echo "VERSION=26.04-custom" >> firmware/CONTROL

          echo "===== CONTROL ====="

          cat firmware/CONTROL

      #
      # Build sysupgrade.bin
      #
      - name: Build sysupgrade
        run: |
          cd firmware

          tar -cvf \
            ../output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-sysupgrade.bin \
            CONTROL \
            kernel \
            root

      #
      # Verify firmware
      #
      - name: Verify firmware
        run: |
          echo "===== OUTPUT ====="

          ls -lah output

          echo

          file output/*

          echo

          sha256sum output/*

      #
      # Upload artifact
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: rg-mtfi-m520-sysupgrade
          path: |
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-sysupgrade.bin
