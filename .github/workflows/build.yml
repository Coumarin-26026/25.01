name: Build M520 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install packages
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            rsync \
            xz-utils \
            zstd \
            squashfs-tools \
            fakeroot \
            file \
            unzip \
            jq

      #
      # Download official firmware
      #
      - name: Download official firmware
        run: |

          mkdir firmware

          cd firmware

          #
          # Kernel
          #
          wget -O kernel.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

          #
          # Original rootfs
          #
          wget -O rootfs-original.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p3-rootfs.bin

      #
      # Extract original rootfs
      #
      - name: Extract original rootfs
        run: |

          mkdir extracted

          unsquashfs \
            -d extracted/rootfs \
            firmware/rootfs-original.bin

      #
      # Overlay custom files
      #
      - name: Overlay custom files
        run: |

          echo "===== BEFORE OVERLAY ====="

          ls extracted/rootfs

          #
          # Copy ONLY custom files
          #
          rsync -a \
            rootfs/ \
            extracted/rootfs/

          echo
          echo "===== AFTER OVERLAY ====="

          ls extracted/rootfs

      #
      # Remove dangerous kernel modules
      #
      - name: Cleanup rootfs
        run: |

          find extracted/rootfs -name "*.ko" -delete || true

          rm -rf extracted/rootfs/usr/lib/opkg || true

      #
      # Build new squashfs
      #
      - name: Build custom rootfs
        run: |

          mksquashfs \
            extracted/rootfs \
            firmware/rootfs.bin \
            -noappend \
            -comp xz \
            -b 262144 \
            -root-owned

      #
      # Create sysupgrade
      #
      - name: Create sysupgrade
        run: |

          mkdir -p output/sysupgrade

          #
          # Firmware parts
          #
          cp firmware/kernel.bin output/sysupgrade/kernel
          cp firmware/rootfs.bin output/sysupgrade/root

          #
          # CONTROL
          #
          cat > output/sysupgrade/CONTROL <<EOF
          BOARD=ruijie,rg-mtfi-m520
          VERSION=26.04-custom
          EOF

          #
          # metadata
          #
          cat > output/sysupgrade/metadata.json <<EOF
          {
            "metadata_version": "1.1",
            "supported_devices": [
              "ruijie,rg-mtfi-m520"
            ],
            "version": {
              "dist": "X-WRT",
              "version": "26.04-custom"
            }
          }
          EOF

          #
          # Create sysupgrade
          #
          cd output/sysupgrade

          tar --sort=name \
              --owner=0 \
              --group=0 \
              --numeric-owner \
              -cvf ../openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin \
              CONTROL \
              kernel \
              root \
              metadata.json

      #
      # Export files
      #
      - name: Export firmware
        run: |

          cp firmware/kernel.bin \
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-kernel.bin

          cp firmware/rootfs.bin \
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-rootfs.bin

      #
      # Verify firmware
      #
      - name: Verify firmware
        run: |

          echo "===== OUTPUT ====="

          ls -lah output

          echo
          echo "===== FILE TYPES ====="

          find output -maxdepth 1 -type f -exec file {} \;

          echo
          echo "===== SHA256 ====="

          find output -maxdepth 1 -type f -exec sha256sum {} \;

      #
      # Upload firmware
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m520-firmware
          path: output/*
