name: Build OpenWrt Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

      #
      # Checkout repository
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install dependencies
      #
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            curl \
            wget \
            rsync \
            unzip \
            xz-utils \
            zstd \
            file

      #
      # Download OpenWrt ImageBuilder
      #
      - name: Download ImageBuilder
        run: |

          wget \
            https://downloads.openwrt.org/releases/25.12.4/targets/ipq806x/generic/openwrt-imagebuilder-25.12.4-ipq806x-generic.Linux-x86_64.tar.zst

          tar --use-compress-program=unzstd -xvf \
            openwrt-imagebuilder-25.12.4-ipq806x-generic.Linux-x86_64.tar.zst

          mv openwrt-imagebuilder-25.12.4-ipq806x-generic.Linux-x86_64 imagebuilder

      #
      # Prepare custom rootfs
      #
      - name: Prepare custom files
        run: |

          mkdir -p imagebuilder/files

          #
          # Copy rootfs
          #
          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            --exclude overlay \
            --exclude rom \
            rootfs/ \
            imagebuilder/files/

          #
          # Remove dangerous files
          #
          rm -rf imagebuilder/files/usr/lib/opkg || true

          #
          # Remove kernel modules if exist
          #
          find imagebuilder/files -name "*.ko" -delete || true

          #
          # Remove temp/cache files
          #
          find imagebuilder/files -name "*.tmp" -delete || true
          find imagebuilder/files -name "*.cache" -delete || true

          #
          # Show copied files
          #
          echo "===== ROOTFS FILES ====="

          find imagebuilder/files | head -300

      #
      # Build firmware
      #
      - name: Build firmware
        run: |

          cd imagebuilder

          make image PROFILE="ruijie_rg-mtfi-m520" \
            PACKAGES="luci" \
            FILES="files"

      #
      # Show firmware files
      #
      - name: Show output
        run: |

          echo "===== OUTPUT ====="

          find imagebuilder/bin/targets/ -type f

      #
      # Upload firmware
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: |
            imagebuilder/bin/targets/ipq806x/generic/*sysupgrade.bin
            imagebuilder/bin/targets/ipq806x/generic/*factory.bin
