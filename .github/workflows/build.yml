name: Build OpenWrt Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free disk space
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      # Install dependencies
      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl

      # Clone OpenWrt
      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git source

      # Update feeds
      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # Create config
      - name: Create config
        run: |
          cd source

          cat > .config <<EOF
          CONFIG_TARGET_ipq806x=y
          CONFIG_TARGET_ipq806x_generic=y
          CONFIG_TARGET_ipq806x_generic_DEVICE_ruijie_rg-mtfi-m520=y
          EOF

          make defconfig

      # Copy custom rootfs
      - name: Copy custom rootfs
        run: |
          mkdir -p source/files

          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            rootfs/ \
            source/files/

      # Build firmware
      - name: Build firmware
        run: |
          cd source

          make -j$(nproc)

      # Upload firmware
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: source/bin/targets/ipq806x/generic/
