name: Build OpenWrt Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Show repo structure
      - name: Show repository structure
        run: |
          echo "===== ROOTFS ====="
          find rootfs | head -300

      # Cleanup dangerous extracted firmware files
      - name: Cleanup rootfs
        run: |
          rm -rf rootfs/dev || true
          rm -rf rootfs/proc || true
          rm -rf rootfs/sys || true
          rm -rf rootfs/tmp || true
          rm -rf rootfs/overlay || true
          rm -rf rootfs/rom || true
          rm -rf rootfs/usr/lib/opkg || true

      # Free disk space
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      # Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl

      # Clone OpenWrt
      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git source

      # Update feeds
      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # Configure target
      - name: Configure target
        run: |
          cd source

          cat > .config <<EOF
          CONFIG_TARGET_ipq806x=y
          CONFIG_TARGET_ipq806x_generic=y
          CONFIG_TARGET_ipq806x_generic_DEVICE_ruijie_rg-mtfi-m520=y
          EOF

          make defconfig

      # Prepare files directory
      - name: Prepare files directory
        run: |
          mkdir -p source/files

      # Copy ETC
      - name: Copy etc
        run: |
          if [ -d "rootfs/etc" ]; then
            mkdir -p source/files/etc

            rsync -a \
              rootfs/etc/ \
              source/files/etc/
          fi

      # Copy WWW
      - name: Copy www
        run: |
          if [ -d "rootfs/www" ]; then
            mkdir -p source/files/www

            rsync -a \
              rootfs/www/ \
              source/files/www/
          fi

      # Copy ROOT
      - name: Copy root home
        run: |
          if [ -d "rootfs/root" ]; then
            mkdir -p source/files/root

            rsync -a \
              rootfs/root/ \
              source/files/root/
          fi

      # Show files copied into firmware
      - name: Show source/files
        run: |
          echo "===== SOURCE FILES ====="

          find source/files | head -300

      # Build firmware
      - name: Build firmware
        run: |
          cd source

          make -j1 V=s 2>&1 | tee build.log

      # Upload build log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: source/build.log

      # Show firmware output
      - name: Show firmware output
        if: success()
        run: |
          find source/bin/targets/ -type f

      # Upload firmware
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: source/bin/targets/ipq806x/generic/
