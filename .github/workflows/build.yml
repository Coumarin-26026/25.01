name: Build M520 Sysupgrade

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout repository
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install packages
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            rsync \
            squashfs-tools \
            xz-utils \
            tar

      #
      # Download latest kernel
      #
      - name: Download kernel
        run: |

          mkdir -p firmware

          wget -O firmware/kernel.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

      #
      # Prepare rootfs
      #
      - name: Prepare rootfs
        run: |

          mkdir -p build-rootfs

          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            --exclude overlay \
            --exclude rom \
            rootfs/ \
            build-rootfs/

          #
          # Required dirs
          #
          mkdir -p build-rootfs/dev
          mkdir -p build-rootfs/proc
          mkdir -p build-rootfs/sys
          mkdir -p build-rootfs/tmp

          #
          # Fake console
          #
          touch build-rootfs/dev/console

          #
          # Remove dangerous kernel modules
          #
          find build-rootfs -name "*.ko" -delete || true

      #
      # Build rootfs.bin
      #
      - name: Build rootfs
        run: |

          mksquashfs \
            build-rootfs \
            firmware/rootfs.bin \
            -noappend \
            -comp xz \
            -b 262144

      #
      # Create sysupgrade.bin
      #
      - name: Create sysupgrade
        run: |

          mkdir -p output/sysupgrade

          #
          # Required filenames
          #
          cp firmware/kernel.bin \
            output/sysupgrade/kernel

          cp firmware/rootfs.bin \
            output/sysupgrade/root

          #
          # CONTROL
          #
          cat > output/sysupgrade/CONTROL << 'EOF'
          BOARD=ruijie,rg-mtfi-m520
          VERSION=Custom
          EOF

          #
          # Create final sysupgrade.bin
          #
          cd output/sysupgrade

          tar -cvf \
            ../openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin \
            CONTROL \
            kernel \
            root

      #
      # Verify firmware
      #
      - name: Verify firmware
        run: |

          ls -lah output

          echo

          file output/*.bin

          echo

          sha256sum output/*.bin

      #
      # Upload sysupgrade.bin
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m520-sysupgrade
          path: |
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin
