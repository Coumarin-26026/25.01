name: Build M520 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout repository
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install packages
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            rsync \
            xz-utils \
            zstd \
            squashfs-tools \
            fakeroot \
            file \
            unzip

      #
      # Download official X-WRT firmware
      #
      - name: Download firmware files
        run: |

          mkdir firmware

          cd firmware

          #
          # Kernel
          #
          wget -O kernel.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

          #
          # Original rootfs
          #
          wget -O rootfs-original.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p3-rootfs.bin

      #
      # Build new squashfs rootfs
      #
      - name: Build custom rootfs
        run: |

          mkdir build-rootfs

          #
          # Copy custom rootfs
          #
          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            --exclude overlay \
            --exclude rom \
            rootfs/ \
            build-rootfs/

          #
          # Remove dangerous files
          #
          find build-rootfs -name "*.ko" -delete || true

          rm -rf build-rootfs/usr/lib/opkg || true

          #
          # Show rootfs
          #
          echo "===== ROOTFS ====="

          find build-rootfs | head -300

          #
          # Create squashfs
          #
          mksquashfs \
            build-rootfs \
            firmware/rootfs.bin \
            -noappend \
            -comp xz \
            -b 262144

      #
      # Create sysupgrade archive
      #
      - name: Create sysupgrade
        run: |

          mkdir output

          cp firmware/kernel.bin output/
          cp firmware/rootfs.bin output/

          cd output

          #
          # Create sysupgrade.tar
          #
          tar -cvf \
            sysupgrade.tar \
            kernel.bin \
            rootfs.bin

          #
          # Rename
          #
          mv sysupgrade.tar \
            openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin

      #
      # Show output
      #
      - name: Show output files
        run: |

          echo "===== OUTPUT ====="

          ls -lah output

      #
      # Upload firmware
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m520-firmware
          path: output/*
