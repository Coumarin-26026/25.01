name: Build OpenWrt Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Free disk space
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo apt clean

      # Install build dependencies
      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl

      # Clone OpenWrt source
      - name: Clone OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git source

      # Update feeds
      - name: Update feeds
        run: |
          cd source

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # Create target config
      - name: Create config
        run: |
          cd source

          cat > .config <<EOF
          CONFIG_TARGET_ipq806x=y
          CONFIG_TARGET_ipq806x_generic=y
          CONFIG_TARGET_ipq806x_generic_DEVICE_ruijie_rg-mtfi-m520=y
          EOF

          make defconfig

      # Create custom files folders
      - name: Prepare custom files
        run: |
          mkdir -p source/files/etc
          mkdir -p source/files/www
          mkdir -p source/files/root

      # Copy config files
      - name: Copy config files
        run: |
          if [ -d "rootfs/etc/config" ]; then
            mkdir -p source/files/etc/config

            rsync -a \
              rootfs/etc/config/ \
              source/files/etc/config/
          fi

      # Copy web files
      - name: Copy web files
        run: |
          if [ -d "rootfs/www" ]; then
            mkdir -p source/files/www

            rsync -a \
              rootfs/www/ \
              source/files/www/
          fi

      # Copy init scripts
      - name: Copy init scripts
        run: |
          if [ -d "rootfs/etc/init.d" ]; then
            mkdir -p source/files/etc/init.d

            rsync -a \
              rootfs/etc/init.d/ \
              source/files/etc/init.d/
          fi

      # Copy rc.local
      - name: Copy rc.local
        run: |
          if [ -f "rootfs/etc/rc.local" ]; then
            mkdir -p source/files/etc

            cp \
              rootfs/etc/rc.local \
              source/files/etc/
          fi

      # Show copied files
      - name: Show copied files
        run: |
          echo "===== source/files ====="

          find source/files | head -200

      # Build firmware with full logs
      - name: Build firmware
        run: |
          cd source

          make -j1 V=s 2>&1 | tee build.log

      # Upload build log even if failed
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: source/build.log

      # Show firmware files
      - name: Show firmware files
        if: success()
        run: |
          find source/bin/targets/ -type f

      # Upload firmware
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: source/bin/targets/ipq806x/generic/
