name: Fast Build Sysupgrade

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Install tools
      - name: Install tools
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            tar \
            gzip \
            xz-utils \
            squashfs-tools \
            fakeroot \
            rsync

      # Download ImageBuilder
      - name: Download ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/24.10.0/targets/ipq806x/generic/openwrt-imagebuilder-24.10.0-ipq806x-generic.Linux-x86_64.tar.zst

          tar --use-compress-program=unzstd -xf \
            openwrt-imagebuilder-24.10.0-ipq806x-generic.Linux-x86_64.tar.zst

          mv openwrt-imagebuilder-* imagebuilder

      # Cleanup rootfs
      - name: Cleanup rootfs
        run: |
          rm -rf rootfs/dev || true
          rm -rf rootfs/proc || true
          rm -rf rootfs/sys || true
          rm -rf rootfs/tmp || true
          rm -rf rootfs/rom || true
          rm -rf rootfs/overlay || true

      # Copy custom files
      - name: Copy files
        run: |
          mkdir -p imagebuilder/files

          if [ -d rootfs/etc ]; then
            mkdir -p imagebuilder/files/etc

            rsync -a rootfs/etc/ imagebuilder/files/etc/
          fi

          if [ -d rootfs/www ]; then
            mkdir -p imagebuilder/files/www

            rsync -a rootfs/www/ imagebuilder/files/www/
          fi

      # Build firmware
      - name: Build firmware
        run: |
          cd imagebuilder

          make image \
            PROFILE="ruijie_rg-mtfi-m520" \
            PACKAGES="" \
            FILES="files"

      # Show output
      - name: Show output
        run: |
          find imagebuilder/bin/targets/ -type f

      # Upload firmware
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: sysupgrade
          path: imagebuilder/bin/targets/ipq806x/generic/*sysupgrade.bin
