name: Build M520 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install tools
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            rsync \
            xz-utils \
            zstd \
            squashfs-tools \
            fakeroot \
            file \
            unzip \
            jq

      #
      # Download official firmware
      #
      - name: Download official files
        run: |

          mkdir firmware

          cd firmware

          wget -O kernel.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

          wget -O original-rootfs.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p3-rootfs.bin

      #
      # Build custom squashfs
      #
      - name: Build rootfs
        run: |

          mkdir -p build-rootfs

          rsync -a \
            --exclude dev \
            --exclude proc \
            --exclude sys \
            --exclude tmp \
            --exclude overlay \
            --exclude rom \
            rootfs/ \
            build-rootfs/

          #
          # Remove kernel modules
          #
          find build-rootfs -name "*.ko" -delete || true

          #
          # Remove opkg cache
          #
          rm -rf build-rootfs/usr/lib/opkg || true

          #
          # Show structure
          #
          echo "===== ROOTFS ====="

          find build-rootfs | head -300

          #
          # Build squashfs
          #
          mksquashfs \
            build-rootfs \
            firmware/rootfs.bin \
            -noappend \
            -comp xz \
            -b 262144 \
            -root-owned

      #
      # Create OpenWrt style sysupgrade
      #
      - name: Create sysupgrade
        run: |

          mkdir -p output/sysupgrade

          #
          # Copy firmware parts
          #
          cp firmware/kernel.bin output/sysupgrade/kernel
          cp firmware/rootfs.bin output/sysupgrade/root

          #
          # Create CONTROL
          #
          cat > output/sysupgrade/CONTROL <<EOF
          BOARD=ruijie,rg-mtfi-m520
          VERSION=26.04-custom
          EOF

          #
          # Create metadata
          #
          cat > output/sysupgrade/metadata.json <<EOF
          {
            "metadata_version": "1.1",
            "supported_devices": [
              "ruijie,rg-mtfi-m520"
            ],
            "version": {
              "dist": "X-WRT",
              "version": "26.04-custom"
            }
          }
          EOF

          #
          # Create sysupgrade.bin
          #
          cd output/sysupgrade

          tar --sort=name \
              --owner=0 \
              --group=0 \
              --numeric-owner \
              -cvf ../openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin \
              CONTROL \
              kernel \
              root \
              metadata.json

      #
      # Create flashable rootfs image
      #
      - name: Create rootfs image
        run: |

          cp firmware/rootfs.bin \
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-rootfs.bin

      #
      # Create kernel image
      #
      - name: Create kernel image
        run: |

          cp firmware/kernel.bin \
            output/openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-kernel.bin

      #
      # Verify files
      #
      - name: Verify firmware
        run: |

          echo "===== OUTPUT ====="

          ls -lah output

          echo

          file output/*

          echo

          sha256sum output/*

      #
      # Upload firmware
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m520-firmware
          path: output/*
