name: Build M520 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      #
      # Checkout repository
      #
      - name: Checkout
        uses: actions/checkout@v4

      #
      # Install packages
      #
      - name: Install packages
        run: |
          sudo apt update

          sudo apt install -y \
            wget \
            curl \
            rsync \
            xz-utils \
            zstd \
            squashfs-tools \
            fakeroot \
            file \
            unzip \
            tar

      #
      # Download official firmware
      #
      - name: Download firmware
        run: |

          mkdir -p firmware

          cd firmware

          #
          # Kernel
          #
          wget -O kernel.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p2-kernel.bin

          #
          # Original rootfs
          #
          wget -O rootfs-original.bin \
            https://downloads.x-wrt.com/rom/x-wrt-26.04-b202605170835-ipq806x-generic-ruijie_rg-mtfi-m520-squashfs-mmcblk0p3-rootfs.bin

      #
      # Extract original rootfs
      #
      - name: Extract original rootfs
        run: |

          mkdir -p extracted/rootfs

          #
          # Extract squashfs
          #
          unsquashfs \
            -f \
            -d extracted/rootfs \
            firmware/rootfs-original.bin || true

          #
          # Recreate important dirs
          #
          mkdir -p extracted/rootfs/dev
          mkdir -p extracted/rootfs/proc
          mkdir -p extracted/rootfs/sys
          mkdir -p extracted/rootfs/tmp

          #
          # Fake console device
          #
          touch extracted/rootfs/dev/console

          echo "===== EXTRACTED ROOTFS ====="

          ls -lah extracted/rootfs

      #
      # Overlay custom rootfs
      #
      - name: Overlay custom files
        run: |

          #
          # Copy your custom files
          #
          rsync -a \
            rootfs/ \
            extracted/rootfs/

          #
          # Remove dangerous kernel modules
          #
          find extracted/rootfs -name "*.ko" -delete || true

          #
          # Remove opkg cache
          #
          rm -rf extracted/rootfs/usr/lib/opkg || true

          #
          # Remove temporary files
          #
          rm -rf extracted/rootfs/tmp/* || true

          echo "===== FINAL ROOTFS ====="

          find extracted/rootfs | head -300

      #
      # Build new squashfs rootfs
      #
      - name: Build new rootfs
        run: |

          mksquashfs \
            extracted/rootfs \
            firmware/rootfs.bin \
            -noappend \
            -comp xz \
            -b 262144

      #
      # Create sysupgrade structure
      #
      - name: Create sysupgrade
        run: |

          mkdir -p output/sysupgrade

          #
          # Copy files
          #
          cp firmware/kernel.bin \
            output/sysupgrade/kernel

          cp firmware/rootfs.bin \
            output/sysupgrade/root

          #
          # Create CONTROL file
          #
          cat > output/sysupgrade/CONTROL << 'EOF'
          BOARD=ruijie,rg-mtfi-m520
          VERSION=Custom
          EOF

          #
          # Build sysupgrade.bin
          #
          cd output/sysupgrade

          tar -cvf \
            ../openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-sysupgrade.bin \
            CONTROL \
            kernel \
            root

          cd ..

          #
          # Copy standalone files
          #
          cp ../firmware/kernel.bin \
            openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-kernel.bin

          cp ../firmware/rootfs.bin \
            openwrt-ipq806x-generic-ruijie_rg-mtfi-m520-rootfs.bin

      #
      # Show output
      #
      - name: Show output
        run: |

          echo "===== OUTPUT ====="

          ls -lah output

          echo

          file output/*.bin

          echo

          sha256sum output/*.bin

      #
      # Upload firmware
      #
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m520-firmware
          path: |
            output/*.bin
